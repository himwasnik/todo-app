<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 60px auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .task-form {
            display: flex;
            gap: 10px;
        }

        .task-form input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .task-form button {
            padding: 10px 15px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .task-form button:hover {
            background: #5a67d8;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f7f7f7;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        a {
            text-decoration: none;
            color: red;
            font-weight: bold;
        }

        a:hover {
            transform: scale(1.2);
        }

        .empty {
            text-align: center;
            color: #888;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📝 My To-Do List</h1>

        <form class="task-form" action="{{ url_for('add_task') }}" method="POST">
            <input type="text" name="task" placeholder="What needs to be done?" required>
            <button type="submit">➕ Add</button>
        </form>

        <ul>
            {% for task in tasks %}
            <li>
                <span>{{ task }}</span>
                <a href="{{ url_for('delete_task', task_id=loop.index0) }}">❌</a>
            </li>
            {% else %}
            <p class="empty">No tasks yet. Add one 🚀</p>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
